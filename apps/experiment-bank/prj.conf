# This is the optional user-specific configuration file.

CONFIG_NET_L2_IEEE802154_RADIO_DFLT_TX_POWER=5

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

# For iot-lab, we need to use UART instead of RTT for logging:
CONFIG_USE_SEGGER_RTT=n
CONFIG_RTT_CONSOLE=n
CONFIG_LOG_BACKEND_RTT=n
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y


CONFIG_NET_MAX_CONTEXTS=30
CONFIG_NET_MAX_CONN=30
CONFIG_ZVFS_OPEN_MAX=64
CONFIG_MAX_PTHREAD_MUTEX_COUNT=16
CONFIG_MAX_PTHREAD_COUNT=16
CONFIG_POSIX_THREAD_THREADS_MAX=16


# For RUDP:
CONFIG_MAIN_STACK_SIZE=32384
CONFIG_HEAP_MEM_POOL_SIZE=7576

# disable for less clutter
CONFIG_LF_RUDP_IP_CHANNEL_STATS=n

CONFIG_LF_RUDP_MAX_RETRIES=64
CONFIG_LF_RUDP_RETRANSMIT_TIMEOUT_MS=100
CONFIG_LF_RUDP_IP_CHANNEL_RECV_THREAD_STACK_SIZE=1536

# CONFIG_NET_TCP=n

# For TCP (doesn't seem to work yet for n=5):
# CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
# CONFIG_MAIN_STACK_SIZE=32768
# CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_NET_TCP=y