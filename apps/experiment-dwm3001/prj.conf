# This is the optional user-specific configuration file.

# CONFIG_LOG_RUNTIME_FILTERING=y

# For iot-lab, we need to use UART instead of RTT for logging:
# CONFIG_USE_SEGGER_RTT=n
# CONFIG_RTT_CONSOLE=n
# CONFIG_LOG_BACKEND_RTT=n
# CONFIG_UART_CONSOLE=y
# CONFIG_LOG_BACKEND_UART=y

# For RUDP:
# CONFIG_NET_TCP=n

CONFIG_IEEE802154_DW3000=y
CONFIG_IEEE802154_NRF5=n

# DW3000 UWB supports HRP UWB channels (use 5 or 9, not 2.4 GHz channel 26).
CONFIG_NET_CONFIG_IEEE802154_CHANNEL=5

# Increase network headroom to avoid RX buffer starvation under RUDP bursts.
CONFIG_NET_PKT_RX_COUNT=24
CONFIG_NET_PKT_TX_COUNT=24
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_BUF_DATA_SIZE=128


CONFIG_LF_RUDP_MAX_RETRIES=128
CONFIG_LF_RUDP_RETRANSMIT_TIMEOUT_MS=250
CONFIG_LF_RUDP_IP_CHANNEL_RECV_THREAD_STACK_SIZE=2048